<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up / Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <style>
    /* 基础样式重置 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: #ffffff; /* 背景为纯白色 */
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column; 
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 30px 10px;
      box-sizing: border-box;
      overflow-y: auto; 
    }

    /* 文件夹卡片外层容器 */
    .card-wrapper {
      position: relative;
      width: 500px;
      height: 600px;
      transform-origin: center center;
    }

    /* 移动端等比缩放，确保线条和结构不走样 */
    @media (max-width: 540px) {
      .card-wrapper {
        transform: scale(0.85);
      }
    }
    @media (max-width: 420px) {
      .card-wrapper {
        transform: scale(0.7);
      }
    }

    /* 文件夹形框——SVG矢量背景（层级设为1，用于遮挡底部的页签线条） */
    .card-borders {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* 通过控制 SVG 路径的显示来切换标签样式 */
    .signup-active .borders-login {
      display: none;
    }
    .signup-active .borders-signup {
      display: block;
    }
    .login-active .borders-signup {
      display: none;
    }
    .login-active .borders-login {
      display: block;
    }

    /* 顶部可点击的透明选项卡按钮 */
    .tab-btn {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif; 
      font-size: 32px; 
      letter-spacing: 2px; 
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: transparent;
      border: none;
      outline: none;
      z-index: 10;
      transition: color 0.1s ease, left 0.1s ease, top 0.1s ease, width 0.1s ease, height 0.1s ease;
    }

    /* 【注册激活状态】下按钮字体的精准位置与颜色（对齐SVG中的内框） */
    .signup-active .tab-btn-signup {
      left: 28px;
      top: 35px;
      width: 180px;
      height: 52px;
      color: #fff; /* 黑色背景配白字 */
    }
    .signup-active .tab-btn-login {
      left: 285px;
      top: 47px;
      width: 180px;
      height: 51px;
      color: #000; /* 白色背景配黑字 */
    }

    /* 【登录激活状态】下按钮字体的精准位置与颜色 */
    .login-active .tab-btn-signup {
      left: 35px;
      top: 47px;
      width: 180px;
      height: 51px;
      color: #000; /* 白色背景配黑字 */
    }
    .login-active .tab-btn-login {
      left: 285px;
      top: 35px;
      width: 180px;
      height: 52px;
      color: #fff; /* 黑色背景配白字 */
    }

    /* 表单内容总区域（固定大小） */
    .form-body {
      position: absolute;
      top: 110px; /* 避开上方页签高度 */
      left: 0;
      width: 500px;
      height: 490px;
      z-index: 5;
    }

    /* 表单内容（设为 relative 以供提交按钮进行 absolute 绝对定位锚定） */
    .form-content {
      width: 100%;
      height: 100%;
      position: relative; 
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      padding-top: 40px; /* 统一表单顶部起点的垂直位置 */
    }

    /* 输入框容器 */
    .inputs-container {
      display: flex;
      flex-direction: column;
      gap: 16px; /* 统一组件之间的间距 */
    }

    /* 输入框组合样式 */
    .input-group {
      width: 400px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .input-group label {
      font-family: 'Bebas Neue', sans-serif; 
      font-size: 18px; 
      color: #000;
      letter-spacing: 2px; 
    }

    .input-group input {
      width: 100%;
      height: 52px;
      border: 2px solid #000; /* 边框线宽保持 2px 纤细 */
      box-sizing: border-box;
      font-family: 'Inter', sans-serif; /* 输入值保留可读性更好的 Inter 字体 */
      font-size: 18px;
      padding: 0 15px;
      font-weight: 700;
      background-color: #fff;
      outline: none;
    }

    /* 忘记密码独立容器 */
    .forgot-pwd-container {
      width: 400px;
      height: 60px; /* 给予合适的高度，在垂直方向上实现完美居中 */
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px; /* 微调间隙 */
    }

    /* 忘记密码交互链接（已调小至 16px） */
    .forgot-pwd-link {
      font-family: 'Bebas Neue', sans-serif; 
      font-size: 16px; 
      color: #000;
      text-decoration: underline;
      letter-spacing: 1.5px; 
      cursor: pointer;
      transition: color 0.15s ease;
    }
    .forgot-pwd-link:hover {
      color: #555;
    }

    /* 提交按钮（绝对定位，已整体上移至 bottom: 80px） */
    .submit-btn {
      position: absolute;
      bottom: 80px; /* 往上移动，留出底部返回空间 */
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 60px;
      background-color: #000;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif; 
      font-size: 30px; 
      letter-spacing: 3px; 
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.15s ease;
    }

    .submit-btn:hover {
      background-color: #222;
    }

    /* 底部返回链接容器 */
    .back-link-container {
      position: absolute;
      bottom: 35px; /* 精确定位在主按钮下方 */
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 底部返回链接（已调小至 14px） */
    .back-link {
      font-family: 'Bebas Neue', sans-serif; 
      font-size: 14px; 
      color: #000;
      text-decoration: underline;
      letter-spacing: 2px; 
      cursor: pointer;
      transition: color 0.15s ease;
    }
    .back-link:hover {
      color: #555;
    }

    .hidden {
      display: none !important;
    }

    /* 邮箱验证弹窗 */
    .email-verification-container {
      display: none; /* 默认隐藏 */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .email-verification-container.active {
      display: flex;
    }

    .verification-box {
      background: #fff;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 2px solid #000;
    }

    .verification-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .verification-box h2 {
      font-family: 'Bebas Neue', sans-serif; 
      font-size: 32px;
      letter-spacing: 3px;
      margin-bottom: 15px;
    }

    .verification-box p {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .verification-box .btn {
      width: 100%;
      padding: 12px;
      font-family: 'Bebas Neue', sans-serif; 
      font-size: 20px;
      letter-spacing: 3px;
      border: 2px solid #000;
      background: #000;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .verification-box .btn:hover {
      background: #fff;
      color: #000;
    }

    /* 错误提示 */
    .error-message {
      color: #e74c3c;
      font-family: 'Inter', sans-serif; 
      font-size: 14px;
      text-align: center;
      display: none;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- 登录注册卡片窗口 -->
  <div class="card-wrapper signup-active" id="card-container">
    
    <!-- 1. 透明按钮层（仅放文字，不带任何边框与背景） -->
    <button class="tab-btn tab-btn-signup" onclick="switchTab('signup')">SIGN UP</button>
    <button class="tab-btn tab-btn-login" onclick="switchTab('login')">LOG IN</button>

    <!-- 2. 完全由矢量控制的文件夹形状线条层 -->
    <svg class="card-borders" viewBox="0 0 500 600" width="500" height="600">
      
      <!-- SIGN UP 激活状态 of 线条 -->
      <g class="borders-signup">
        <!-- 未激活的登录选项卡 (底层)：包括外轮廓与内框线 -->
        <path d="M 270,110 L 270,35 L 480,35 L 480,110" fill="#fff" stroke="#000" stroke-width="2" stroke-linejoin="miter" />
        <rect x="285" y="47" width="180" height="51" fill="#fff" stroke="#000" stroke-width="2" stroke-linejoin="miter" />
        
        <!-- 激活的注册选项卡与主箱体 (表层)：包括外轮廓斜切面与内黑底方块 -->
        <path d="M 2,598 L 2,15 L 235,15 L 255,110 L 498,110 L 498,598 Z" fill="#fff" stroke="#000" stroke-width="2" stroke-linejoin="miter" />
        <rect x="28" y="35" width="180" height="52" fill="#000" stroke="#000" stroke-width="2" stroke-linejoin="miter" />
      </g>

      <!-- LOG IN 激活状态 of 线条 -->
      <g class="borders-login">
        <!-- 未激活的注册选项卡 (底层)：包括外轮廓与内框线 -->
        <path d="M 20,110 L 20,35 L 230,35 L 230,110" fill="#fff" stroke="#000" stroke-width="2" stroke-linejoin="miter" />
        <rect x="35" y="47" width="180" height="51" fill="#fff" stroke="#000" stroke-width="2" stroke-linejoin="miter" />
        
        <!-- 激活的登录选项卡与主箱体 (表层)：包括外轮廓斜切面与内黑底方块 -->
        <path d="M 2,598 L 2,110 L 235,110 L 255,15 L 498,15 L 498,598 Z" fill="#fff" stroke="#000" stroke-width="2" stroke-linejoin="miter" />
        <rect x="285" y="35" width="180" height="52" fill="#000" stroke="#000" stroke-width="2" stroke-linejoin="miter" />
      </g>
    </svg>

    <!-- 3. 表单表层 -->
    <div class="form-body">
      
      <!-- SIGN UP 表单 -->
      <form id="signup-form" class="form-content" onsubmit="event.preventDefault(); handleSignup();">
        <div class="inputs-container">
          <div class="input-group">
            <label>EMAIL</label>
            <input type="email" id="signupEmail" required>
          </div>
          <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="signupPassword" required>
          </div>
          <div class="input-group">
            <label>CONFIRM PASSWORD</label>
            <input type="password" id="signupConfirmPassword" required>
          </div>
        </div>
        <div class="error-message" id="signupError"></div>
        <button type="submit" class="submit-btn">SIGN UP</button>
        <div class="back-link-container">
          <span class="back-link" onclick="window.location.href='index.html';">← BACK TO WUKUWORK</span>
        </div>
      </form>

      <!-- LOG IN 表单 -->
      <form id="login-form" class="form-content hidden" onsubmit="event.preventDefault(); handleLogin();">
        <div class="inputs-container">
          <div class="input-group">
            <label>EMAIL</label>
            <input type="email" id="loginEmail" required>
          </div>
          <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="loginPassword" required>
          </div>
          <!-- 忘记密码独立容器 -->
          <div class="forgot-pwd-container">
            <span class="forgot-pwd-link" onclick="handleForgotPassword();">FORGOT PASSWORD?</span>
          </div>
        </div>
        <div class="error-message" id="loginError"></div>
        <button type="submit" class="submit-btn">LOG IN</button>
        <div class="back-link-container">
          <span class="back-link" onclick="window.location.href='index.html';">← BACK TO WUKUWORK</span>
        </div>
      </form>

      <!-- RESET PASSWORD 表单 -->
      <form id="reset-password-form" class="form-content hidden" onsubmit="event.preventDefault(); handleResetPassword();">
        <div class="inputs-container">
          <div class="input-group">
            <label>EMAIL</label>
            <input type="email" id="resetEmail" readonly>
          </div>
          <div class="input-group">
            <label>NEW PASSWORD</label>
            <input type="password" id="resetPassword" required>
          </div>
          <div class="input-group">
            <label>CONFIRM NEW PASSWORD</label>
            <input type="password" id="resetConfirmPassword" required>
          </div>
        </div>
        <div class="error-message" id="resetError"></div>
        <button type="submit" class="submit-btn">RESET PASSWORD</button>
        <div class="back-link-container">
          <span class="back-link" onclick="window.location.href='index.html';">← BACK TO WUKUWORK</span>
        </div>
      </form>

    </div>
  </div>

  <!-- 邮箱验证弹窗 -->
  <div class="email-verification-container" id="verificationModal">
    <div class="verification-box">
      <div class="verification-icon">✉️</div>
      <h2>*VERIFY YOUR EMAIL</h2>
      <p>A verification email has been sent to <span id="verifyEmail"></span>. Please check your inbox and click the link to complete your registration.</p>
      <button class="btn" id="resendBtn" onclick="handleResendVerification();">RESEND EMAIL</button>
    </div>
  </div>

  <script>
    function switchTab(state) {
      const container = document.getElementById('card-container');
      const signupForm = document.getElementById('signup-form');
      const loginForm = document.getElementById('login-form');

      if (state === 'signup') {
        container.classList.remove('login-active');
        container.classList.add('signup-active');
        signupForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
      } else {
        container.classList.remove('signup-active');
        container.classList.add('login-active');
        signupForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
      }
    }

    async function handleSignup() {
      var email = document.getElementById('signupEmail').value;
      var password = document.getElementById('signupPassword').value;
      var confirmPassword = document.getElementById('signupConfirmPassword').value;
      var errorEl = document.getElementById('signupError');
      
      errorEl.style.display = 'none';
      
      if (!email || !password || !confirmPassword) {
        errorEl.textContent = 'Please fill in all fields';
        errorEl.style.display = 'block';
        return;
      }
      
      if (password !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match';
        errorEl.style.display = 'block';
        return;
      }
      
      try {
        console.log('Attempting signup with email:', email);
        var { data, error } = await _supabase.auth.signUp({
          email: email,
          password: password
        }, {
          redirectTo: window.location.origin + '/login.html'
        });
        
        console.log('Signup response:', { data, error });
        
        if (error) {
          errorEl.textContent = error.message || 'Registration failed';
          errorEl.style.display = 'block';
        } else {
          var username = email.split('@')[0];
          if (data.user) {
            await _supabase.from('profiles').upsert({
              id: data.user.id,
              username: username
            });
          }
          
          document.getElementById('verifyEmail').textContent = email;
          document.getElementById('verificationModal').classList.add('active');
        }
      } catch (err) {
        console.error('Signup error:', err);
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      }
    }

    async function handleLogin() {
      var email = document.getElementById('loginEmail').value;
      var password = document.getElementById('loginPassword').value;
      var errorEl = document.getElementById('loginError');
      
      errorEl.style.display = 'none';
      
      if (!email || !password) {
        errorEl.textContent = 'Please fill in both fields';
        errorEl.style.display = 'block';
        return;
      }
      
      try {
        console.log('Attempting login with email:', email);
        var { data, error } = await _supabase.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        console.log('Login response:', { data, error });
        
        if (error) {
          errorEl.textContent = error.message || 'Login failed';
          errorEl.style.display = 'block';
        } else {
          window.location.href = 'profile.html';
        }
      } catch (err) {
        console.error('Login error:', err);
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      }
    }

    async function handleForgotPassword() {
      var email = document.getElementById('loginEmail').value;
      
      if (!email) {
        alert('Please enter your email address first.');
        return;
      }
      
      try {
        var { error } = await _supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/login.html'
        });
        
        if (error) {
          alert('Failed to send password reset email. Please try again.');
        } else {
          alert('Password reset email has been sent! Please check your inbox.');
        }
      } catch (err) {
        alert('Network error. Please try again.');
      }
    }

    function showResetPasswordForm(email) {
      document.getElementById('signup-form').classList.add('hidden');
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('reset-password-form').classList.remove('hidden');
      document.getElementById('resetEmail').value = email;
      
      var card = document.getElementById('card-container');
      card.classList.remove('signup-active');
      card.classList.remove('login-active');
    }

    async function handleResetPassword() {
      var email = document.getElementById('resetEmail').value;
      var password = document.getElementById('resetPassword').value;
      var confirmPassword = document.getElementById('resetConfirmPassword').value;
      var errorEl = document.getElementById('resetError');
      
      if (password !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }
      
      try {
        var { error } = await _supabase.auth.updateUser({
          password: password
        });
        
        if (error) {
          errorEl.textContent = error.message || 'Failed to reset password';
          errorEl.style.display = 'block';
        } else {
          alert('Password reset successful! You can now login with your new password.');
          showLoginTab();
        }
      } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      }
    }

    async function handleResendVerification() {
      var email = document.getElementById('signupEmail').value;
      
      if (!email) {
        alert('Please enter your email address.');
        return;
      }
      
      try {
        var { error } = await _supabase.auth.resend({
          type: 'signup',
          email: email
        });
        
        if (error) {
          alert('Failed to resend verification email. Please try again.');
        } else {
          alert('Verification email resent successfully!');
        }
      } catch (err) {
        alert('Network error. Please try again.');
      }
    }

    async function checkAuthCallback() {
      var urlParams = new URLSearchParams(window.location.search);
      var token_hash = urlParams.get('token_hash');
      var type = urlParams.get('type');
      var email = urlParams.get('email');

      console.log('Auth callback params:', { token_hash, type, email });

      if (token_hash && type && email) {
        try {
          var { data, error } = await _supabase.auth.verifyOtp({
            email: email,
            token_hash: token_hash,
            type: type
          });

          console.log('verifyOtp result:', { data, error });

          if (error) {
            alert('Verification failed: ' + error.message);
          } else {
            if (type === 'email') {
              alert('Email verified successfully! You can now login.');
              showLoginTab();
            } else if (type === 'recovery') {
              alert('Password reset link verified! Please enter your new password below.');
              showResetPasswordForm(email);
            } else {
              alert('Verification completed.');
              showLoginTab();
            }
          }
        } catch (err) {
          console.error('Verification exception:', err);
          alert('Error: ' + err.message);
        }
        
        var newUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, newUrl);
      } else {
        console.log('Missing required params for auth callback');
      }
    }

    window.addEventListener('load', checkAuthCallback);
  </script>
</body>
</html>
