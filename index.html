<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WUKUWORK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body, a, button, [onclick], [role="button"] {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #000;
      cursor: none !important;
      overflow-x: hidden;
    }

    /* Custom Cursor */
    .custom-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: transform 0.3s ease, width 0.3s ease, height 0.3s ease;
      width: 32px;
      height: 32px;
    }
    .custom-cursor.hovering { width: 48px; height: 48px; }
    .custom-cursor svg { width: 100%; height: 100%; transition: transform 0.3s ease; }

    /* Loading Screen */
    .loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .loading-screen.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

    /* 3D Dice */
    .dice-wrapper {
      position: absolute;
      top: 50%; left: 50%;
      margin-left: -16.5px;
      margin-top: -16.5px;
      width: 33px; height: 33px;
      animation: diceDrop 2s cubic-bezier(0.33, 0, 0.2, 1) forwards;
    }
    .dice {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: diceBounce 2s ease-out forwards;
    }
    .face {
      position: absolute;
      width: 33px; height: 33px;
      background: #fff;
      border: 1.5px solid #000;
      box-sizing: border-box;
      backface-visibility: visible;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: #000;
      font-weight: bold;
    }
    .front  { transform: translateZ(16.5px); }
    .back   { transform: rotateY(180deg) translateZ(16.5px); }
    .right  { transform: rotateY(90deg) translateZ(16.5px); }
    .left   { transform: rotateY(-90deg) translateZ(16.5px); }
    .top    { transform: rotateX(90deg) translateZ(16.5px); }
    .bottom { transform: rotateX(-90deg) translateZ(16.5px); }
    @keyframes diceDrop {
      0% { transform: translateY(-45vh); }
      50% { transform: translateY(0); }
      65% { transform: translateY(-5vh); }
      78% { transform: translateY(0); }
      88% { transform: translateY(-1.5vh); }
      100% { transform: translateY(0); }
    }
    @keyframes diceBounce {
      0% { transform: rotateX(0deg) rotateZ(0deg); }
      50% { transform: rotateX(0deg) rotateZ(0deg); }
      65% { transform: rotateX(120deg) rotateZ(80deg); }
      78% { transform: rotateX(200deg) rotateZ(140deg); }
      88% { transform: rotateX(240deg) rotateZ(170deg); }
      100% { transform: rotateX(270deg) rotateZ(180deg); }
    }

    /* Main Content */
    .main-content {
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .main-content.fade-in { opacity: 1; }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 60px 20px 20px;
    }
    .hero-svg-container {
      position: relative;
      max-width: 450px;
      width: 100%;
    }
    .hero-svg-container svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Smoke Effect */
    .smoke-container {
      position: absolute;
      pointer-events: none;
      z-index: 10;
    }
    .smoke-particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.05) 40%, transparent 70%);
      animation: smokeRise 4s ease-out infinite;
      opacity: 0;
    }
    @keyframes smokeRise {
      0% { opacity: 0; transform: translateY(0) scale(0.5); }
      15% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-60px) scale(2.5) translateX(20px); }
    }

    /* Ash particles falling from smoke */
    .ash-container {
      position: absolute;
      pointer-events: none;
      z-index: 15;
    }
    .ash-particle {
      position: absolute;
      background: #000;
      opacity: 0;
      animation: ashFall linear forwards;
    }
    @keyframes ashFall {
      0% { opacity: 0; transform: translateY(0); }
      15% { opacity: 1; }
      100% { opacity: 1; transform: translateY(var(--fall-distance)); }
    }
    /* SVG ash particles - use SVG transform attribute via CSS */
    .svg-ash {
      opacity: 0;
    }
    .svg-ash.falling {
      opacity: 1;
      transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
    }

    /* Rectangle tilt animation - center point fixed */
    #menu-btn-rect {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: 101.7px 211.1px; /* center of enlarged rect */
    }
    #menu-btn-rect.tilted {
      transform: rotate(8deg);
    }


    /* Toolbar Header */
    /* Footer */
    .page-footer {
      background: #fff;
      padding: 10px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: -75px;
      border-top: 1px solid #231815;
      border-bottom: 1px solid #231815;
    }
    .footer-svg-container {
      width: 227.56px;
      flex-shrink: 0;
    }
    .footer-svg-container svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .custom-cursor { display: none; }
      body, a, button, [onclick], [role="button"] { cursor: auto !important; }
      .toolbar-header { padding: 8px 15px; }
    }
  </style>

    } else {
      sessionStorage.setItem('hasVisitedIndex', 'true');
    }
  </script>

  <script src="toolbar.js"></script>
  <script>
    // Loading screen fade sequence
    setTimeout(function() {
      var ls = document.getElementById('loadingScreen');
      if (ls) ls.classList.add('fade-out');
    }, 2000);

    setTimeout(function() {
      var mc = document.getElementById('mainContent');
      if (mc) mc.classList.add('fade-in');
    }, 2800);

    // Custom cursor
    var customCursor = document.getElementById('customCursor');
    var cursorSvg = document.getElementById('cursorSvg');
    if (customCursor) {
      document.addEventListener('mousemove', function(e) {
        customCursor.style.left = e.clientX + 'px';
        customCursor.style.top = e.clientY + 'px';
      });
    }

    function setCursorMinus() {
      if (cursorSvg) cursorSvg.innerHTML = '<rect fill="#040000" x="21.3" y="26.4" width="13.31" height="3.11"/>';
    }
    function setCursorPlus() {
      if (cursorSvg) cursorSvg.innerHTML = '<rect fill="#040000" x="21.3" y="21.3" width="13.31" height="3.11"/><rect fill="#040000" x="26.4" y="16.2" width="3.11" height="13.31"/>';
    }

    var isClicking = false;
    document.addEventListener('mousedown', function() { isClicking = true; setCursorPlus(); });
    document.addEventListener('mouseup', function() { isClicking = false; setCursorMinus(); });

    // Smoke effect
    var smokeContainer = document.getElementById('smokeContainer');
    var ashContainer = document.getElementById('ashContainer');
    var menuBtnRect = document.getElementById('menu-btn-rect');
    var hasTilted = false;

    if (smokeContainer) {
      smokeContainer.style.left = '63.7%';
      smokeContainer.style.top = '31.8%';
      smokeContainer.style.width = '20px';
      smokeContainer.style.height = '20px';

      setTimeout(function() {
        for (var i = 0; i < 6; i++) {
          (function(index) {
            setTimeout(function() {
              var p = document.createElement('div');
              p.className = 'smoke-particle';
              p.style.width = (8 + Math.random() * 12) + 'px';
              p.style.height = p.style.width;
              p.style.left = (Math.random() * 20 - 10) + 'px';
              p.style.top = (Math.random() * 20 - 10) + 'px';
              p.style.animationDelay = (Math.random() * 2) + 's';
              p.style.animationDuration = (3 + Math.random() * 2) + 's';
              smokeContainer.appendChild(p);
            }, index * 600);
          })(i);
        }
      }, 3000);
    }

    // Ash falling effect - 7 tiny SVG ashes fall from smoke into rect and disappear
    if (ashContainer) {
      ashContainer.style.display = 'none';

      setTimeout(function() {
        var svg = document.querySelector('.hero-svg-container svg');
        
        // Rect: x=53.47, y=202.88, width=96.47, height=16.42
        var rectX = 53.47;
        var rectY = 202.88;
        var rectW = 96.47;
        var rectH = 16.42;

        for (var i = 0; i < 7; i++) {
          (function(index) {
            setTimeout(function() {
              var ash = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
              ash.setAttribute('class', 'svg-ash');
              
              // Size: 0.5-1 SVG units
              var ashW = 0.5 + Math.random() * 0.5;
              var ashH = 0.5 + Math.random() * 0.5;
              
              // Start at smoke position (x≈130, y≈92), fall vertically to rect
              var startX = 128 + Math.random() * 4; // smoke x area
              var startY = 92 + Math.random() * 4;  // smoke y area
              var landY = rectY + Math.random() * (rectH - ashH);
              var fallDist = landY - startY;
              
              ash.setAttribute('x', startX);
              ash.setAttribute('y', startY);
              ash.setAttribute('width', ashW);
              ash.setAttribute('height', ashH);
              ash.setAttribute('fill', '#666'); // gray ash, visible on both backgrounds
              
              svg.appendChild(ash);
              
              // Animate falling
              ash.style.opacity = '0';
              ash.style.transition = 'transform ' + (0.8 + Math.random() * 0.4) + 's ease-in';
              ash.getBoundingClientRect();
              ash.style.opacity = '1';
              ash.style.transform = 'translateY(' + fallDist + 'px)';
              
              // Disappear when hitting rect
              setTimeout(function() {
                ash.style.opacity = '0';
                ash.style.transition = 'opacity 0.05s';
                // Remove from DOM after fade
                setTimeout(function() {
                  if (ash.parentNode) ash.parentNode.removeChild(ash);
                }, 100);
              }, 900);
            }, index * 150);
          })(i);
        }
        
        // Rotate rect+text after ashes
        setTimeout(function() {
          if (!hasTilted) {
            var rect = document.getElementById('menu-btn-rect');
            var textPaths = document.querySelectorAll('.svg-st2');
            var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('id', 'rect-text-group');
            rect.parentNode.insertBefore(g, rect);
            g.appendChild(rect);
            for (var t = 0; t < textPaths.length; t++) {
              g.appendChild(textPaths[t]);
            }
            g.setAttribute('transform', 'rotate(6, 101.7, 211.1)');
            hasTilted = true;
          }
        }, 2000);
      }, 4000);
    }
  </script>
