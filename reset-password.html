<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESET PASSWORD - WUKUWORK</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body, a, button { cursor: none !important; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .custom-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: transform 0.3s ease, width 0.3s ease, height 0.3s ease;
      width: 32px;
      height: 32px;
    }
    .custom-cursor.hovering { width: 48px; height: 48px; }
    .custom-cursor svg { width: 100%; height: 100%; transition: transform 0.3s ease; }

    .reset-container {
      max-width: 440px;
      width: 100%;
      border: 2px solid #000;
      padding: 40px;
      background: #fff;
      text-align: center;
    }

    .reset-container h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }

    .reset-container p {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #000;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus {
      background: #fdfdfd;
    }

    .btn {
      width: 100%;
      height: 50px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      border: 2px solid #000;
      background: #000;
      color: #fff;
      cursor: none;
      transition: background 0.3s, color 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    .message {
      padding: 15px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
      text-align: left;
      border: 2px solid #000;
    }
    .message.success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .message.error {
      background: #ffebee;
      color: #c62828;
    }

    @media (max-width: 768px) {
      .custom-cursor { display: none; }
      body, a, button { cursor: auto !important; }
    }
  </style>
</head>
<body>

  <!-- 自定义鼠标指针 -->
  <div class="custom-cursor" id="customCursor">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 55.91 55.91" id="cursorSvg">
      <rect fill="#040000" x="21.3" y="26.4" width="13.31" height="3.11"/>
    </svg>
  </div>

  <div class="reset-container">
    <h2>* RESET PASSWORD</h2>
    <p>Please enter your email and set a new password to secure your account.</p>

    <div class="message" id="messageBox"></div>

    <form id="resetForm" onsubmit="handleReset(event)">
      <!-- 1. 邮箱输入框 -->
      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" id="resetEmail" required placeholder="Enter your email">
      </div>

      <!-- 2. 新密码输入框 -->
      <div class="form-group">
        <label>NEW PASSWORD</label>
        <input type="password" id="newPassword" required placeholder="Min 6 characters">
      </div>

      <!-- 3. 确认密码输入框 -->
      <div class="form-group">
        <label>CONFIRM PASSWORD</label>
        <input type="password" id="confirmPassword" required placeholder="Repeat new password">
      </div>

      <button type="submit" class="btn" id="submitBtn">UPDATE PASSWORD</button>
    </form>
  </div>

  <script>
    // 鼠标指针交互逻辑
    var customCursor = document.getElementById('customCursor');
    var cursorSvg = document.getElementById('cursorSvg');
    
    if (customCursor) {
      document.addEventListener('mousemove', function(e) {
        customCursor.style.left = e.clientX + 'px';
        customCursor.style.top = e.clientY + 'px';
      });
    }

    function setCursorMinus() {
      if (cursorSvg) cursorSvg.innerHTML = '<rect fill="#040000" x="21.3" y="26.4" width="13.31" height="3.11"/>';
    }

    function setCursorPlus() {
      if (cursorSvg) cursorSvg.innerHTML = '<rect fill="#040000" x="21.3" y="21.3" width="13.31" height="3.11"/><rect fill="#040000" x="26.4" y="16.2" width="3.11" height="13.31"/>';
    }

    document.addEventListener('mousedown', setCursorPlus);
    document.addEventListener('mouseup', setCursorMinus);

    function bindHover(el) {
      if (!el) return;
      el.addEventListener('mouseenter', function() {
        if (customCursor) customCursor.classList.add('hovering');
        setCursorPlus();
      });
      el.addEventListener('mouseleave', function() {
        if (customCursor) customCursor.classList.remove('hovering');
        setCursorMinus();
      });
    }

    bindHover(document.getElementById('submitBtn'));

    // 提示框工具
    function showMessage(text, type) {
      var msgBox = document.getElementById('messageBox');
      msgBox.textContent = text;
      msgBox.className = 'message ' + type;
      msgBox.style.display = 'block';
    }

    // 核心重置逻辑
    async function handleReset(event) {
      event.preventDefault();

      var emailInput = document.getElementById('resetEmail').value.trim();
      var newPassword = document.getElementById('newPassword').value;
      var confirmPassword = document.getElementById('confirmPassword').value;

      // 验证1：两次密码输入是否一致
      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      // 验证2：密码长度
      if (newPassword.length < 6) {
        showMessage('Password must be at least 6 characters long.', 'error');
        return;
      }

      try {
        // 当用户通过邮件中的重置链接进入此页面时，Supabase 已经自动在当前设备上建立了临时会话。
        // 这里首先校验输入的邮箱与当前会话中的用户邮箱是否一致，确保安全性。
        var { data: { user }, error: userError } = await _supabase.auth.getUser();
        
        if (userError || !user) {
          throw new Error('Your reset session has expired or is invalid. Please request a new reset link.');
        }

        if (user.email.toLowerCase() !== emailInput.toLowerCase()) {
          throw new Error('The email entered does not match the account requesting a reset.');
        }

        // 调用 Supabase 更新当前登录用户的密码
        var { error: updateError } = await _supabase.auth.updateUser({
          password: newPassword
        });

        if (updateError) throw updateError;

        showMessage('Password updated successfully! Redirecting to login...', 'success');
        
        // 修改成功后，清除临时登录状态并于 2.5 秒后跳转到登录页面
        setTimeout(async function() {
          await _supabase.auth.signOut();
          window.location.href = 'login.html';
        }, 2500);

      } catch (error) {
        console.error('Error resetting password:', error);
        showMessage(error.message || 'Failed to update password.', 'error');
      }
    }

    // 初始化时，如果检测到临时会话，可尝试自动填入邮箱
    window.addEventListener('load', async function() {
      try {
        var { data: { user } } = await _supabase.auth.getUser();
        if (user && user.email) {
          document.getElementById('resetEmail').value = user.email;
        }
      } catch (e) {
        // 忽略，让用户手动输入即可
      }
    });
  </script>
</body>
</html>
