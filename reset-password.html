<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESET PASSWORD - WUKUWORK</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body, a, button { cursor: none !important; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .custom-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: transform 0.3s ease, width 0.3s ease, height 0.3s ease;
      width: 32px;
      height: 32px;
    }
    .custom-cursor.hovering { width: 48px; height: 48px; }
    .custom-cursor svg { width: 100%; height: 100%; transition: transform 0.3s ease; }

    .reset-container {
      max-width: 480px;
      width: 100%;
      border: 2px solid #000;
      padding: 40px;
      background: #fff;
      text-align: center;
    }

    .reset-container h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }

    .reset-container p {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #000;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus {
      background: #fdfdfd;
    }

    .btn {
      width: 100%;
      height: 50px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      border: 2px solid #000;
      background: #000;
      color: #fff;
      cursor: none;
      transition: background 0.3s, color 0.3s;
      margin-top: 15px;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    .message {
      padding: 15px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
      text-align: left;
      border: 2px solid #000;
    }
    .message.success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .message.error {
      background: #ffebee;
      color: #c62828;
    }

    .question-section {
      border: 1px dashed #000;
      padding: 15px;
      margin-bottom: 20px;
      background: #fafafa;
    }

    .question-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      color: #000;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .custom-cursor { display: none; }
      body, a, button { cursor: auto !important; }
    }
  </style>
</head>
<body>

  <!-- 自定义鼠标指针 -->
  <div class="custom-cursor" id="customCursor">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 55.91 55.91" id="cursorSvg">
      <rect fill="#040000" x="21.3" y="26.4" width="13.31" height="3.11"/>
    </svg>
  </div>

  <div class="reset-container">
    <h2>* RESET PASSWORD</h2>
    <p>Answer your security questions first to verify your identity and set a new password.</p>

    <div class="message" id="messageBox"></div>

    <form id="resetForm" onsubmit="handleReset(event)" style="display: none;">
      
      <!-- 动态密保验证板块 -->
      <div class="question-section" id="questionsWrapper">
        <div style="text-align: left; margin-bottom: 15px; font-weight: bold; font-size: 12px; letter-spacing: 1px; font-family: 'Bebas Neue', sans-serif;">
          * VERIFY SECURITY QUESTIONS
        </div>
        
        <!-- 问题 1 -->
        <div class="form-group">
          <div class="question-title" id="labelQ1">QUESTION 1: LOADING...</div>
          <input type="text" id="ans1" required placeholder="Enter Answer 1">
        </div>

        <!-- 问题 2 -->
        <div class="form-group">
          <div class="question-title" id="labelQ2">QUESTION 2: LOADING...</div>
          <input type="text" id="ans2" required placeholder="Enter Answer 2">
        </div>

        <!-- 问题 3 -->
        <div class="form-group">
          <div class="question-title" id="labelQ3">QUESTION 3: LOADING...</div>
          <input type="text" id="ans3" required placeholder="Enter Answer 3">
        </div>
      </div>

      <!-- 账号邮箱验证 -->
      <div class="form-group">
        <label>CONFIRM EMAIL ADDRESS</label>
        <input type="email" id="resetEmail" required placeholder="Enter your account email">
      </div>

      <!-- 新密码设置 -->
      <div class="form-group">
        <label>NEW PASSWORD</label>
        <input type="password" id="newPassword" required placeholder="Min 6 characters">
      </div>

      <!-- 确认密码 -->
      <div class="form-group">
        <label>CONFIRM PASSWORD</label>
        <input type="password" id="confirmPassword" required placeholder="Repeat new password">
      </div>

      <button type="submit" class="btn" id="submitBtn">VERIFY & UPDATE PASSWORD</button>
    </form>
  </div>

  <script>
    // 鼠标指针交互逻辑
    var customCursor = document.getElementById('customCursor');
    var cursorSvg = document.getElementById('cursorSvg');
    
    if (customCursor) {
      document.addEventListener('mousemove', function(e) {
        customCursor.style.left = e.clientX + 'px';
        customCursor.style.top = e.clientY + 'px';
      });
    }

    function setCursorMinus() {
      if (cursorSvg) cursorSvg.innerHTML = '<rect fill="#040000" x="21.3" y="26.4" width="13.31" height="3.11"/>';
    }

    function setCursorPlus() {
      if (cursorSvg) cursorSvg.innerHTML = '<rect fill="#040000" x="21.3" y="21.3" width="13.31" height="3.11"/><rect fill="#040000" x="26.4" y="16.2" width="3.11" height="13.31"/>';
    }

    document.addEventListener('mousedown', setCursorPlus);
    document.addEventListener('mouseup', setCursorMinus);

    function bindHover(el) {
      if (!el) return;
      el.addEventListener('mouseenter', function() {
        if (customCursor) customCursor.classList.add('hovering');
        setCursorPlus();
      });
      el.addEventListener('mouseleave', function() {
        if (customCursor) customCursor.classList.remove('hovering');
        setCursorMinus();
      });
    }

    bindHover(document.getElementById('submitBtn'));

    // 提示框工具
    function showMessage(text, type) {
      var msgBox = document.getElementById('messageBox');
      msgBox.textContent = text;
      msgBox.className = 'message ' + type;
      msgBox.style.display = 'block';
    }

    // 全局存储拉取到的密保答案
    var dbAnswers = { a1: '', a2: '', a3: '' };

    // 页面载入时：自动识别登录的临时会话，拉取用户的密保问题
    window.addEventListener('load', async function() {
      try {
        var { data: { user }, error: userError } = await _supabase.auth.getUser();
        if (userError || !user) {
          throw new Error('Your reset session is invalid or has expired. Please request a new reset link.');
        }

        // 查询当前用户的密保问题和答案
        var { data: profile, error: profileError } = await _supabase
          .from('profiles')
          .select('q1, a1, q2, a2, q3, a3')
          .eq('id', user.id)
          .single();

        // 【关键诊断】：如果报错，立刻弹窗报出 Supabase 的底层真实报错原因！
        if (profileError || !profile) {
          console.error("Database query error details:", profileError);
          
          var errorMsg = "Database Error Info:\n" +
                         "Code: " + (profileError?.code || "No Code") + "\n" +
                         "Message: " + (profileError?.message || "No Message") + "\n" +
                         "Hint: " + (profileError?.hint || "No Hint");
          
          alert(errorMsg); // 页面会直接弹窗展示这个信息，方便您拍照或截图
          throw new Error('Could not load user security questions. Profile not found or database column configuration error.');
        }

        // 将问题渲染到 HTML 页面上
        document.getElementById('labelQ1').textContent = "Q1: " + profile.q1;
        document.getElementById('labelQ2').textContent = "Q2: " + profile.q2;
        document.getElementById('labelQ3').textContent = "Q3: " + profile.q3;

        // 临时记录正确答案用来客户端校验
        dbAnswers.a1 = profile.a1;
        dbAnswers.a2 = profile.a2;
        dbAnswers.a3 = profile.a3;

        // 自动填入邮箱并禁止修改
        var emailInput = document.getElementById('resetEmail');
        emailInput.value = user.email || '';
        emailInput.disabled = true;

        // 展示表单
        document.getElementById('resetForm').style.display = 'block';

      } catch (error) {
        console.error('Initialization error:', error);
        showMessage(error.message || 'Verification failed. Please contact support.', 'error');
      }
    });

    // 核心重置逻辑：先验密保答案，再改密码
    async function handleReset(event) {
      event.preventDefault();

      var ans1 = document.getElementById('ans1').value.trim();
      var ans2 = document.getElementById('ans2').value.trim();
      var ans3 = document.getElementById('ans3').value.trim();
      
      var newPassword = document.getElementById('newPassword').value;
      var confirmPassword = document.getElementById('confirmPassword').value;

      // 1. 安全验证：校验 3 个密保问题是否答对 (不区分大小写，去掉首尾空格)
      if (
        ans1.toLowerCase() !== dbAnswers.a1.toLowerCase() ||
        ans2.toLowerCase() !== dbAnswers.a2.toLowerCase() ||
        ans3.toLowerCase() !== dbAnswers.a3.toLowerCase()
      ) {
        showMessage('Verification failed! One or more security answers are incorrect.', 'error');
        return;
      }

      // 2. 验证：两次密码输入是否一致
      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      // 3. 验证：密码长度
      if (newPassword.length < 6) {
        showMessage('Password must be at least 6 characters long.', 'error');
        return;
      }

      try {
        var { data: { user }, error: userError } = await _supabase.auth.getUser();
        if (userError || !user) {
          throw new Error('Your reset session has expired. Please try requesting a new link.');
        }

        // 4. 调用 Supabase 正式修改密码
        var { error: updateError } = await _supabase.auth.updateUser({
          password: newPassword
        });

        if (updateError) throw updateError;

        showMessage('Identity verified! Password updated successfully. Redirecting to login...', 'success');
        
        // 5. 修改成功后登出，防止带有重置 token 留在前台，2.5 秒后跳转到登录
        setTimeout(async function() {
          await _supabase.auth.signOut();
          window.location.href = 'login.html';
        }, 2500);

      } catch (error) {
        console.error('Error resetting password:', error);
        showMessage(error.message || 'Failed to update password.', 'error');
      }
    }
  </script>
</body>
</html>
