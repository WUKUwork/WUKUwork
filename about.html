  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body, a, button { cursor: none !important; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #000;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Custom Cursor */
    .custom-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: transform 0.3s ease, width 0.3s ease, height 0.3s ease;
      width: 32px;
      height: 32px;
    }
    .custom-cursor.hovering { width: 48px; height: 48px; }
    .custom-cursor svg { width: 100%; height: 100%; transition: transform 0.3s ease; }

    /* Page Header */
    .page { min-height: 100vh; display: flex; flex-direction: column; }

    /* About Content */
    .about-content {
      flex: 1;
      position: relative;
      width: 100%;
      min-height: calc(100vh - 57.86px);
      background: #fff;
      overflow: auto;
      padding-top: 80px;
    }

    /* Layout container */
    .about-layout {
      position: relative;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      min-height: 100%;
      padding: 40px 5%;
    }

    /* Title */
    .about-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

      width: 100%;
      height: auto;
      display: block;
      visibility: hidden;
    }
    /* 可见的黑色线条 - 绝对定位叠加在轮廓上 */

      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
    }

    /* 文字内容 */
    .about-text {
      font-size: 14px;
      line-height: 1.8;
      color: #000;
      text-align: justify;
    }
    .about-text p {
      margin-bottom: 16px;
      text-indent: 2em;
    }
    .about-text p:first-of-type {
      text-indent: 0;
    }

    /* Clear float */
    .clearfix::after {
      content: '';
      display: table;
      clear: both;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .custom-cursor { display: none; }

      .page-header { padding: 20px; }
      .page-header h1 { font-size: 28px; }
      .about-layout { padding: 20px 5%; }
      .chair-wrapper {
        width: 200px;
        margin: 0 0 15px 20px;
      }
      .about-text { font-size: 12px; }
    }

    @media (max-width: 480px) {
      .chair-wrapper {
        width: 150px;
        margin: 0 0 10px 15px;
      }
    }

        <div class="about-text">
          <h2 class="about-title">WUKUwork-+5</h2>
          <p>——以生活为基础，以哲思为追求，在日常中融入本质的思考进而打造设计美学。</p>
          <p>5，即是手，是最初的哲学，是劳动与创造重要的身体媒介。我们在掂量一块石头时，手承受了石头的重力；在抚摸木质时，手接受了木的温润。在感受切实世界的我们，思考从来不是脱离身体的纯粹思辨，而是根植于我们与世界的这种最具体、最亲密的互动之中。</p>
          <p>-+，即是未知与在场，它意味着我们永远选择深入未知，并成为其中确定的光点。我们拥抱变化的可能，并以创造的姿态，将未来转化为可触达的当下。</p>
        </div>

  <script>
    // Custom cursor
    var customCursor = document.getElementById('customCursor');
    var cursorSvg = document.getElementById('cursorSvg');
    if (customCursor) {
      document.addEventListener('mousemove', function(e) {
        customCursor.style.left = e.clientX + 'px';
        customCursor.style.top = e.clientY + 'px';
      });
    }

    function setCursorMinus() {
      if (cursorSvg) cursorSvg.innerHTML = '<rect fill="#040000" x="21.3" y="26.4" width="13.31" height="3.11"/>';
    }
    function setCursorPlus() {
      if (cursorSvg) cursorSvg.innerHTML = '<rect fill="#040000" x="21.3" y="21.3" width="13.31" height="3.11"/><rect fill="#040000" x="26.4" y="16.2" width="3.11" height="13.31"/>';
    }

    var isClicking = false;
    document.addEventListener('mousedown', function() { isClicking = true; setCursorPlus(); });
    document.addEventListener('mouseup', function() { isClicking = false; setCursorMinus(); });

    var interactives = document.querySelectorAll('a, .back-link, button, .chair-wrapper');
    for (var i = 0; i < interactives.length; i++) {
      (function(el) {
        el.addEventListener('mouseenter', function() {
          if (customCursor) customCursor.classList.add('hovering');
          if (!isClicking) setCursorPlus();
        });
        el.addEventListener('mouseleave', function() {
          if (customCursor) customCursor.classList.remove('hovering');
          if (!isClicking) setCursorMinus();
        });
      })(interactives[i]);
    }

    // 拖拽功能
    (function() {
      var pattern = document.getElementById('chairWrapper');
      if (!pattern) return;
      var isDragging = false;
      var startX = 0, startY = 0;
      var origMarginTop = 0, origMarginRight = 0, origMarginBottom = 0, origMarginLeft = 0;

      function getNum(v) { return parseFloat(v) || 0; }

      pattern.addEventListener('mousedown', function(e) {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        var cs = getComputedStyle(pattern);
        origMarginTop = getNum(cs.marginTop);
        origMarginRight = getNum(cs.marginRight);
        origMarginBottom = getNum(cs.marginBottom);
        origMarginLeft = getNum(cs.marginLeft);
        pattern.style.zIndex = '100';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        var dx = e.clientX - startX;
        var dy = e.clientY - startY;
        pattern.style.marginTop = (origMarginTop + dy) + 'px';
        pattern.style.marginRight = Math.max(0, origMarginRight - dx) + 'px';
        pattern.style.marginBottom = (origMarginBottom - dy) + 'px';
        pattern.style.marginLeft = Math.max(0, origMarginLeft + dx) + 'px';
      });

      document.addEventListener('mouseup', function() {
        if (isDragging) {
          isDragging = false;
          pattern.style.zIndex = '10';
        }
      });

      // Touch support
      pattern.addEventListener('touchstart', function(e) {
        isDragging = true;
        var t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
        var cs = getComputedStyle(pattern);
        origMarginTop = getNum(cs.marginTop);
        origMarginRight = getNum(cs.marginRight);
        origMarginBottom = getNum(cs.marginBottom);
        origMarginLeft = getNum(cs.marginLeft);
        pattern.style.zIndex = '100';
      }, { passive: true });

      document.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        var t = e.touches[0];
        var dx = t.clientX - startX;
        var dy = t.clientY - startY;
        pattern.style.marginTop = (origMarginTop + dy) + 'px';
        pattern.style.marginRight = Math.max(0, origMarginRight - dx) + 'px';
        pattern.style.marginBottom = (origMarginBottom - dy) + 'px';
        pattern.style.marginLeft = Math.max(0, origMarginLeft + dx) + 'px';
      }, { passive: true });

      document.addEventListener('touchend', function() {
        if (isDragging) {
          isDragging = false;
          pattern.style.zIndex = '10';
        }
      });
    })();
  </script>
