<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnIqUe PrOdUcT - WUKUWORK</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body, a, button, [onclick], [role="button"] {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #000;
      cursor: none !important;
      overflow-x: hidden;
      overflow-y: hidden;
    }
    .custom-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: transform 0.3s ease, width 0.3s ease, height 0.3s ease;
      width: 32px;
      height: 32px;
    }
    .custom-cursor.hovering { width: 48px; height: 48px; }
    .custom-cursor svg { width: 100%; height: 100%; transition: transform 0.3s ease; }
    .page { min-height: 100vh; display: flex; flex-direction: column; }
    .works-gallery {
      flex: 1;
      position: relative;
      width: 100%;
      height: calc(100vh - 57.86px);
      overflow: auto;
      background: #fff;
      padding-top: 100px;
    }
    .work-item {
      position: absolute;
      user-select: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      z-index: 1;
    }
    .work-item:hover { z-index: 10; transform: scale(1.02); }
    .work-item.dragging {
      z-index: 1000;
      opacity: 0.9;
      transform: scale(1.05);
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    .work-item img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      border: 1px solid #000;
    }
    .work-label {
      margin-top: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #000;
      line-height: 1.4;
      pointer-events: auto;
      transition: color 0.3s;
      padding: 4px 0;
    }
    .work-label:hover { color: #666; }
    .work-label .label-category { font-size: 11px; color: #666; }
    .work-label .label-title { font-size: 13px; font-weight: 500; }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 5000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      background: #fff;
      border: 2px solid #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 24px 24px 16px;
      flex-shrink: 0;
    }
    .modal-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 500;
      color: #000;
      line-height: 1.4;
      max-width: 70%;
    }
    .modal-title .title-category {
      font-size: clamp(12px, 2vw, 16px);
      color: #666;
    }
    .modal-close {
      width: 36px;
      height: 36px;
      background: #000;
      border: none;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }
    .modal-close:hover { background: #333; transform: scale(1.1); }
    .modal-close svg { width: 60%; height: 60%; display: block; }
    .modal-body {
      display: flex;
      flex: 1;
      min-height: 0;
      padding: 0 24px 24px;
      gap: 16px;
    }
    .modal-image-area {
      flex: 1;
      min-height: 0;
      background: transparent;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .modal-image-area img {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 16px;
    }
    .modal-image-area img:last-child { margin-bottom: 0; }
    .modal-image-area::-webkit-scrollbar { width: 4px; }
    .modal-image-area::-webkit-scrollbar-track { background: #f0f0f0; }
    .modal-image-area::-webkit-scrollbar-thumb { background: #999; }
    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .modal-action-btn {
      width: 48px;
      height: 48px;
      border: 1.5px solid #000;
      background: #fff;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .modal-action-btn:hover { background: #000; }
    .modal-action-btn:hover svg { fill: #fff; stroke: #fff; }
    .modal-action-btn svg { width: 24px; height: 24px; display: block; }
    @media (max-width: 1024px) {
      .modal-container {
        max-width: 700px;
      }
      .modal-action-btn {
        width: 44px;
        height: 44px;
      }
      .modal-action-btn svg {
        width: 22px;
        height: 22px;
      }
    }
    @media (max-width: 768px) {
      .custom-cursor { display: none; }
      body, a, button, [onclick], [role="button"] { cursor: auto !important; }
      body { overflow-y: auto !important; } /* 解决手机端无法上下滑动的问题 */
      .page-header { padding: 20px; }
      .page-header h1 { font-size: 28px; }
      .work-item {
        position: relative !important;
        left: auto !important;
        top: auto !important;
        width: 90% !important;
        max-width: 400px;
        margin: 20px auto;
      }
      .works-gallery {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 80px 0 20px; /* 顶部内边距改为 80px，防止第一个作品被固定工具栏遮挡 */
        height: auto;
        min-height: auto;
      }
      .modal-container {
        max-width: 100%;
      }
      .modal-header {
        padding: 16px 16px 12px;
      }
      .modal-body {
        padding: 0 16px 16px;
        gap: 12px;
      }
      .modal-action-btn {
        width: 40px;
        height: 40px;
      }
      .modal-action-btn svg {
        width: 20px;
        height: 20px;
      }
    }
    @media (max-width: 480px) {
      .modal-overlay {
        padding: 10px;
      }
      .modal-header {
        padding: 12px 12px 8px;
      }
      .modal-body {
        padding: 0 12px 12px;
        gap: 8px;
      }
      .modal-title {
        font-size: 12px;
      }
      .modal-title .title-category {
        font-size: 10px;
      }
      .modal-action-btn {
        width: 36px;
        height: 36px;
      }
      .modal-action-btn svg {
        width: 18px;
        height: 18px;
      }
    }
  </style>
  <script src="toolbar.js"></script>
</head>
<body>
  <div class="custom-cursor" id="customCursor">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 55.91 55.91" id="cursorSvg">
      <rect fill="#040000" x="21.3" y="26.4" width="13.31" height="3.11"/>
    </svg>
  </div>
  <div class="page">
    <div class="works-gallery" id="worksGallery">
      <!-- 01 = dice / Finger-Guessing Game -->
      <div class="work-item" data-id="1" data-category="dice" data-title="Finger-Guessing Game" data-modal-images='[]'>
        <img src="images/cc405f06-3cce-4438-b1c0-6f876d8ed3e1_6782270e-c829-48a2-95b3-cbb64e06261f_未标题-1-01.png" alt="Finger-Guessing Game">
        <div class="work-label">
          <div class="label-category">*dice</div>
          <div class="label-title">&lt;Finger-Guessing Game&gt;</div>
        </div>
      </div>

      <!-- 02 = hanging piece / 2026 Horse Year Pendant -->
      <div class="work-item" data-id="2" data-category="hanging piece" data-title="2026 Horse Year Pendant" data-modal-images='["images/horse宣传-01.jpg","images/horse宣传-02.jpg","images/horse宣传-04.jpg"]'>
        <img src="images/37d56bb9-e451-40a5-ab8f-194fbfe2bcb2_ba39ff53-9d36-49a4-b5b5-b0469df510a1_未标题-1-02.png" alt="2026 Horse Year Pendant">
        <div class="work-label">
          <div class="label-category">*hanging piece</div>
          <div class="label-title">&lt;2026 Horse Year Pendant&gt;</div>
        </div>
      </div>

      <!-- 03 = album / Before the Hand Opens -->
      <div class="work-item" data-id="3" data-category="album" data-title="Before the Hand Opens" data-modal-images='[]'>
        <img src="images/c4e89cdc-e156-461c-a574-211f00a615b0_13fc56b7-f836-4abf-862e-bed9762e8388_未标题-1-03.png" alt="Before the Hand Opens">
        <div class="work-label">
          <div class="label-category">*album</div>
          <div class="label-title">&lt;Before the Hand Opens&gt;</div>
        </div>
      </div>

      <!-- 04 = rings / I Swear -->
      <div class="work-item" data-id="4" data-category="rings" data-title="I Swear" data-modal-images='[]'>
        <img src="images/1ba12ade-16b2-4226-86ab-d410c3a37df4_70b8a225-b984-4824-a707-c24e96fae58f_未标题-1-04.png" alt="I Swear">
        <div class="work-label">
          <div class="label-category">*rings</div>
          <div class="label-title">&lt;I Swear&gt;</div>
        </div>
      </div>

      <!-- 05 = stick / Extension of the Palm -->
      <div class="work-item" data-id="5" data-category="stick" data-title="Extension of the Palm" data-modal-images='[]'>
        <img src="images/c2ab9d94-f14b-436d-a574-69cc1c935af3_d4d2b4f5-74bc-4d37-9bc4-85a052462d65_未标题-1-05.png" alt="Extension of the Palm">
        <div class="work-label">
          <div class="label-category">*stick</div>
          <div class="label-title">&lt;Extension of the Palm&gt;</div>
        </div>
      </div>

      <!-- 06 = bakery / Hand-Shaped Baked Bread -->
      <div class="work-item" data-id="6" data-category="bakery" data-title="Hand-Shaped Baked Bread" data-modal-images='[]'>
        <img src="images/6ed1e614-2b4d-4c80-adbe-7d2af1508319_68e9217c-65a7-43e7-9c23-432fce789147_未标题-1-06.png" alt="Hand-Shaped Baked Bread">
        <div class="work-label">
          <div class="label-category">*bakery</div>
          <div class="label-title">&lt;Hand-Shaped Baked Bread&gt;</div>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-container">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">
          <div class="title-category"></div>
          <div></div>
        </div>
        <button class="modal-close" id="modalClose">
          <svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
            <line x1="1" y1="1" x2="11" y2="11" stroke="#FFFFFF" stroke-width="1.5"/>
            <line x1="11" y1="1" x2="1" y2="11" stroke="#FFFFFF" stroke-width="1.5"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-image-area" id="modalImageArea"></div>
        <div class="modal-actions">
          <button class="modal-action-btn" id="btnFavorite" title="Favorite">
            <svg viewBox="0 0 24 24" fill="none" stroke="#040000" stroke-width="1.5">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
          </button>
          <button class="modal-action-btn" id="btnCart" title="Add to Cart">
            <svg viewBox="0 0 24 24" fill="none" stroke="#040000" stroke-width="1.5">
              <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
          </button>
          <button class="modal-action-btn" id="btnService" title="Service">
            <svg viewBox="0 0 24 24" fill="none" stroke="#040000" stroke-width="1.5">
              <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script>
    var customCursor = document.getElementById('customCursor');
    var cursorSvg = document.getElementById('cursorSvg');
    if (customCursor) {
      document.addEventListener('mousemove', function(e) {
        customCursor.style.left = e.clientX + 'px';
        customCursor.style.top = e.clientY + 'px';
      });
    }
    function setCursorMinus() {
      if (cursorSvg) cursorSvg.innerHTML = '<rect fill="#040000" x="21.3" y="26.4" width="13.31" height="3.11"/>';
    }
    function setCursorPlus() {
      if (cursorSvg) cursorSvg.innerHTML = '<rect fill="#040000" x="21.3" y="21.3" width="13.31" height="3.11"/><rect fill="#040000" x="26.4" y="16.2" width="3.11" height="13.31"/>';
    }
    var isClicking = false;
    document.addEventListener('mousedown', function() { isClicking = true; setCursorPlus(); });
    document.addEventListener('mouseup', function() { isClicking = false; setCursorMinus(); });
    var menuBtn = document.getElementById('menu-btn');
    var userBtn = document.getElementById('user-btn');
    var menuPopup = document.getElementById('menuPopup');
    function bindHover(el) {
      if (!el) return;
      el.addEventListener('mouseenter', function() {
        if (customCursor) customCursor.classList.add('hovering');
        if (!isClicking) setCursorPlus();
      });
      el.addEventListener('mouseleave', function() {
        if (customCursor) customCursor.classList.remove('hovering');
        if (!isClicking) setCursorMinus();
      });
    }
    if (menuBtn) {
      bindHover(menuBtn);
      menuBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (menuPopup) menuPopup.classList.toggle('active');
      });
    }
    if (userBtn) {
      bindHover(userBtn);
      userBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        window.location.href = 'profile.html';
      });
    }
    if (menuPopup) {
      document.addEventListener('click', function(e) {
        if (menuPopup.classList.contains('active') && e.target !== menuBtn && !menuPopup.contains(e.target)) {
          menuPopup.classList.remove('active');
        }
      });
    }
    var gallery = document.getElementById('worksGallery');
    function initPositions() {
      if (window.innerWidth <= 768) return;
      var items = document.querySelectorAll('.work-item');
      var galleryWidth = gallery.clientWidth;
      var itemWidth = 280;
      var cols = Math.max(3, Math.floor(galleryWidth / (itemWidth + 40)));
      var totalGap = galleryWidth - (cols * itemWidth);
      var gapX = totalGap / (cols + 1);
      var gapY = 30;
      var startX = gapX;
      var startY = 100;
      var colHeights = [];
      for (var c = 0; c < cols; c++) colHeights.push(0);
      items.forEach(function(item) {
        var img = item.querySelector('img');
        var label = item.querySelector('.work-label');
        var labelHeight = label ? label.offsetHeight : 40;
        var itemHeight = img && img.complete && img.naturalWidth > 0 ? img.naturalHeight * (itemWidth / img.naturalWidth) + labelHeight + 8 : 380;
        var shortestCol = 0;
        for (var i = 1; i < cols; i++) {
          if (colHeights[i] < colHeights[shortestCol]) shortestCol = i;
        }
        item.style.left = (startX + shortestCol * (itemWidth + gapX)) + 'px';
        item.style.top = (startY + colHeights[shortestCol]) + 'px';
        item.style.width = itemWidth + 'px';
        colHeights[shortestCol] += itemHeight + gapY;
      });
    }
    var draggedItem = null;
    var dragOffsetX = 0;
    var dragOffsetY = 0;
    document.querySelectorAll('.work-item').forEach(function(item) {
      item.addEventListener('mousedown', function(e) {
        if (e.target.closest('.work-label')) return;
        if (window.innerWidth <= 768) return;
        draggedItem = item;
        item.classList.add('dragging');
        var rect = item.getBoundingClientRect();
        var galleryRect = gallery.getBoundingClientRect();
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        e.preventDefault();
      });
      item.addEventListener('touchstart', function(e) {
        if (e.target.closest('.work-label')) return;
        if (window.innerWidth <= 768) return;
        draggedItem = item;
        item.classList.add('dragging');
        var rect = item.getBoundingClientRect();
        var galleryRect = gallery.getBoundingClientRect();
        var touch = e.touches[0];
        dragOffsetX = touch.clientX - rect.left;
        dragOffsetY = touch.clientY - rect.top;
      }, { passive: false });
    });
    document.addEventListener('mousemove', function(e) {
      if (!draggedItem) return;
      var galleryRect = gallery.getBoundingClientRect();
      var newX = e.clientX - galleryRect.left - dragOffsetX;
      var newY = e.clientY - galleryRect.top - dragOffsetY;
      var itemRect = draggedItem.getBoundingClientRect();
      newX = Math.max(0, Math.min(newX, galleryRect.width - itemRect.width));
      newY = Math.max(0, Math.min(newY, gallery.scrollHeight - itemRect.height));
      draggedItem.style.left = newX + 'px';
      draggedItem.style.top = newY + 'px';
    });
    document.addEventListener('touchmove', function(e) {
      if (!draggedItem) return;
      e.preventDefault();
      var galleryRect = gallery.getBoundingClientRect();
      var touch = e.touches[0];
      var newX = touch.clientX - galleryRect.left - dragOffsetX;
      var newY = touch.clientY - galleryRect.top - dragOffsetY;
      var itemRect = draggedItem.getBoundingClientRect();
      newX = Math.max(0, Math.min(newX, galleryRect.width - itemRect.width));
      newY = Math.max(0, Math.min(newY, gallery.scrollHeight - itemRect.height));
      draggedItem.style.left = newX + 'px';
      draggedItem.style.top = newY + 'px';
    }, { passive: false });
    document.addEventListener('mouseup', function() {
      if (draggedItem) { draggedItem.classList.remove('dragging'); draggedItem = null; }
    });
    document.addEventListener('touchend', function() {
      if (draggedItem) { draggedItem.classList.remove('dragging'); draggedItem = null; }
    });
    var modalOverlay = document.getElementById('modalOverlay');
    var modalTitle = document.getElementById('modalTitle');
    var modalImageArea = document.getElementById('modalImageArea');
    document.querySelectorAll('.work-label').forEach(function(label) {
      label.addEventListener('click', function(e) {
        e.stopPropagation();
        var workItem = label.closest('.work-item');
        var category = workItem.dataset.category;
        var title = workItem.dataset.title;
        var coverSrc = workItem.querySelector('img').src;
        var modalImages = [];
        try { modalImages = JSON.parse(workItem.dataset.modalImages || '[]'); } catch(err) { modalImages = []; }
        modalTitle.innerHTML = '<div class="title-category">*' + category + '</div><div>&lt;' + title + '&gt;</div>';
        modalImageArea.innerHTML = '';
        if (modalImages.length > 0) {
          modalImages.forEach(function(src) {
            var img = document.createElement('img');
            img.src = src;
            img.alt = title;
            modalImageArea.appendChild(img);
          });
        } else {
          var img = document.createElement('img');
          img.src = coverSrc;
          img.alt = title;
          modalImageArea.appendChild(img);
        }
        modalImageArea.scrollTop = 0;
        modalOverlay.classList.add('active');
      });
    });
    document.getElementById('modalClose').addEventListener('click', function() {
      modalOverlay.classList.remove('active');
    });
    modalOverlay.addEventListener('click', function(e) {
      if (e.target === modalOverlay) {
        modalOverlay.classList.remove('active');
      }
    });
    document.getElementById('btnFavorite').addEventListener('click', function() {
      alert('Added to favorites!');
    });
    document.getElementById('btnCart').addEventListener('click', function() {
      alert('Added to cart!');
    });
    document.getElementById('btnService').addEventListener('click', function() {
      alert('Customer service coming soon!');
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
        modalOverlay.classList.remove('active');
      }
    });
    window.addEventListener('load', function() {
      var images = document.querySelectorAll('.work-item img');
      var loaded = 0;
      var total = images.length;
      if (total === 0) { initPositions(); return; }
      images.forEach(function(img) {
        if (img.complete) {
          loaded++;
          if (loaded === total) initPositions();
        } else {
          img.addEventListener('load', function() {
            loaded++;
            if (loaded === total) initPositions();
          });
          img.addEventListener('error', function() {
            loaded++;
            if (loaded === total) initPositions();
          });
        }
      });
    });
    window.addEventListener('resize', initPositions);
  </script>
</body>
</html>
